name: 自动发布版本 (按需构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 额外增加：支持在 GitHub 网页上手动点击按钮触发构建

permissions:
  contents: write

jobs:
  # --- Windows 打包任务 ---
  build-windows:
    # 逻辑：如果没有后缀，或者后缀包含 win，则运行
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-win')
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 解析版本号
        shell: pwsh
        run: |
          $rawTag = "${{ github.ref_name }}"
          $projectVersion = if ($rawTag.startsWith("v")) { $rawTag.substring(1).Split("-")[0] } else { "1.0.0" }
          echo "PROJECT_VERSION=$projectVersion" >> $env:GITHUB_ENV
          Write-Host "Resolved Version: $projectVersion"
      
      - name: 构建 Windows 安装包 (MSI/EXE)
        run: ./gradlew :composeApp:packageDistributionForCurrentOS -PversionName="${{ env:PROJECT_VERSION }}"
      
      - name: 构建 Windows 绿色版目录
        run: ./gradlew :composeApp:createDistributable -PversionName="${{ env:PROJECT_VERSION }}"
      
      - name: 构建 Windows UberJar
        run: ./gradlew :composeApp:packageUberJarForCurrentOS -PversionName="${{ env:PROJECT_VERSION }}"

      - name: 压缩绿色版
        shell: pwsh
        run: Compress-Archive -Path "composeApp/build/compose/binaries/main/app/GeminiUIForge/*" -DestinationPath "GeminiUIForge-Windows-Portable.zip"
      
      - name: 打印详细错误日志 (仅在失败时)
        if: failure()
        shell: pwsh
        run: |
          Write-Host "Checking for error logs in composeApp/build/compose/logs..."
          if (Test-Path "composeApp/build/compose/logs") {
            $logFiles = Get-ChildItem -Path "composeApp/build/compose/logs" -Filter "*-err.txt" -Recurse
            if ($logFiles.Count -eq 0) {
                Write-Host "No *-err.txt files found in logs directory."
            } else {
                foreach ($file in $logFiles) {
                    Write-Host "`n-----------------   ERROR LOG: $($file.FullName)   -----------------"
                    Get-Content $file.FullName
                    Write-Host "--------------------------------------------------------------------`n"
                }
            }
          } else {
            Write-Host "Log directory 'composeApp/build/compose/logs' does not exist."
          }
      
      - name: 上传错误日志 (仅在失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: composeApp/build/compose/logs
      
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/jars/*.jar
            GeminiUIForge-Windows-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- macOS 打包任务 ---
  build-macos:
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-mac')
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 解析版本号
        run: |
          RAW_TAG="${{ github.ref_name }}"
          if [[ $RAW_TAG == v* ]]; then
            PROJECT_VERSION=$(echo ${RAW_TAG#v} | cut -d'-' -f1)
          else
            PROJECT_VERSION="1.0.0"
          fi
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV
          echo "Resolved Version: $PROJECT_VERSION"
          chmod +x gradlew

      - name: 构建 macOS 安装包 (DMG)
        run: ./gradlew :composeApp:packageDistributionForCurrentOS -PversionName="${{ env.PROJECT_VERSION }}"
      
      - name: 构建 macOS 绿色版目录
        run: ./gradlew :composeApp:createDistributable -PversionName="${{ env.PROJECT_VERSION }}"
      
      - name: 构建 macOS UberJar
        run: ./gradlew :composeApp:packageUberJarForCurrentOS -PversionName="${{ env.PROJECT_VERSION }}"

      - name: 压缩绿色版
        run: |
          cd composeApp/build/compose/binaries/main/app && zip -r ../../../../../GeminiUIForge-macOS-Portable.zip GeminiUIForge.app
      
      - name: 打印详细错误日志 (仅在失败时)
        if: failure()
        run: |
          echo "Checking for error logs in composeApp/build/compose/logs..."
          if [ -d "composeApp/build/compose/logs" ]; then
            ERROR_LOGS=$(find composeApp/build/compose/logs -name "*-err.txt")
            if [ -z "$ERROR_LOGS" ]; then
              echo "No *-err.txt files found in logs directory."
            else
              for file in $ERROR_LOGS; do
                echo -e "\n-----------------   ERROR LOG: $file   -----------------"
                cat "$file"
                echo -e "--------------------------------------------------------------------\n"
              done
            fi
          else
            echo "Log directory 'composeApp/build/compose/logs' does not exist."
          fi
      
      - name: 上传错误日志 (仅在失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-logs
          path: composeApp/build/compose/logs
      
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/jars/*.jar
            GeminiUIForge-macOS-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Android 打包任务 ---
  build-android:
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-android')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 打包 Android APK
        run: |
          RAW_TAG="${{ github.ref_name }}"
          if [[ $RAW_TAG == v* ]]; then
            PROJECT_VERSION=$(echo ${RAW_TAG#v} | cut -d'-' -f1)
          else
            PROJECT_VERSION="1.0.0"
          fi
          ./gradlew :composeApp:assembleRelease -PversionName="$PROJECT_VERSION"
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}