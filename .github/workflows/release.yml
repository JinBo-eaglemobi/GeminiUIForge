name: 自动发布版本 (按需构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 额外增加：支持在 GitHub 网页上手动点击按钮触发构建

permissions:
  contents: write

jobs:
  # --- Windows 打包任务 ---
  build-windows:
    # 逻辑：如果没有后缀，或者后缀包含 win，则运行
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-win')
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 生成 Windows 产物 (含 JAR/安装包/绿色版)
        shell: pwsh
        run: |
          $rawTag = "${{ github.ref_name }}"
          $projectVersion = if ($rawTag.startsWith("v")) { $rawTag.substring(1).Split("-")[0] } else { "1.0.0" }
          ./gradlew :composeApp:packageDistributionForCurrentOS -PversionName="$projectVersion"
          ./gradlew :composeApp:createDistributable -PversionName="$projectVersion"
          ./gradlew :composeApp:packageUberJarForCurrentOS -PversionName="$projectVersion"
      - name: 压缩绿色版
        shell: pwsh
        run: Compress-Archive -Path "composeApp/build/compose/binaries/main/app/GeminiUIForge/*" -DestinationPath "GeminiUIForge-Windows-Portable.zip"
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/jars/*.jar
            GeminiUIForge-Windows-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- macOS 打包任务 ---
  build-macos:
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-mac')
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 授权并打包
        run: |
          chmod +x gradlew
          RAW_TAG="${{ github.ref_name }}"
          if [[ $RAW_TAG == v* ]]; then
            PROJECT_VERSION=$(echo ${RAW_TAG#v} | cut -d'-' -f1)
          else
            PROJECT_VERSION="1.0.0"
          fi
          ./gradlew :composeApp:packageDistributionForCurrentOS -PversionName="$PROJECT_VERSION"
          ./gradlew :composeApp:createDistributable -PversionName="$PROJECT_VERSION"
      - name: 压缩绿色版
        run: |
          cd composeApp/build/compose/binaries/main/app && zip -r ../../../../../GeminiUIForge-macOS-Portable.zip GeminiUIForge.app
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            GeminiUIForge-macOS-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Android 打包任务 ---
  build-android:
    if: |
      !contains(github.ref_name, '-') || 
      contains(github.ref_name, '-android')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 打包 Android APK
        run: |
          RAW_TAG="${{ github.ref_name }}"
          if [[ $RAW_TAG == v* ]]; then
            PROJECT_VERSION=$(echo ${RAW_TAG#v} | cut -d'-' -f1)
          else
            PROJECT_VERSION="1.0.0"
          fi
          ./gradlew :composeApp:assembleRelease -PversionName="$PROJECT_VERSION"
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}